name: Update Event Data
on:
  schedule:
    - cron: '10 5,11,17,23 * * *'
  workflow_dispatch: 

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.10'

      - name: Install Dependencies
        run: pip install pandas openpyxl

      - name: Process Data
        run: python data_processor.py

      - name: Commit and Push
        run: |
          git config --global user.name "EventBot"
          git config --global user.email "bot@github.com"
          git add events.json
          git commit -m "Automated Event Update" || exit 0
          git push