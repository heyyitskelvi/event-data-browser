<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gen Con Event Browser</title>
    
    <link href="https://unpkg.com/tabulator-tables@5.5.0/dist/css/tabulator_midnight.min.css" rel="stylesheet">
    <script type="text/javascript" src="https://unpkg.com/tabulator-tables@5.5.0/dist/js/tabulator.min.js"></script>

    <style>
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: #121212;
            color: #e0e0e0;
            margin: 0;
            padding: 10px;
            width: calc(100% - 20px);
        }
        h2 { color: #fff; }
        #event-table {
            width: 100%;
            background-color: #1e1e1e;
            border-radius: 8px;
            overflow: hidden;
            margin: 0 auto;
        }
        .tabulator-header-filter input {
            padding: 4px !important;
            border-radius: 4px !important;
        }
    </style>
</head>
<body>

    <h2>Gen Con Event Browser</h2>
    <div style="margin-bottom: 10px; font-size: 1.2em;">
        Total Events: <span id="event-count">0</span>
    </div>
    <div id="event-table"></div>

    <script type="text/javascript">
        var table = new Tabulator("#event-table", {
            ajaxURL: "events.json",
            layout: "fitColumns",
            responsiveLayout: "hide",
            pagination: "local",
            paginationSize: 50,
            placeholder: "Loading event data...",
            
            columns: [
                {title: "Title", field: "Title", headerFilter: "input", formatter: "textarea"},
                {title: "Category", field: "Event Type", width: 200, 
                    headerFilter: "list", 
                    headerFilterParams: {valuesLookup: true, clearable: true}
                },         
                {title: "System", field: "Game System", width: 200, headerFilter: "input"},
                {title: "Organizer", field: "Group", width: 180, headerFilter: "input"},
                {title: "Day", field: "Day", width: 120, 
                    headerFilter: "list", 
                    headerFilterParams: {valuesLookup: true, clearable: true}
                },
                {title: "Time", field: "Time", width: 100, sorter: "time"},
                {title: "Cost", field: "Cost $", width: 80, hozAlign: "center"},
                {title: "Remaining", field: "Tickets Available", width: 100, hozAlign: "center"},
            ],
        });

        table.on("dataLoadError", function(error){
            console.error("Data Load Error:", error);
            alert("Could not load events.json. Make sure the GitHub Action has run successfully at least once.");
        });
    </script>
</body>
</html>
